<!doctype html>
<html lang="sl">
  <head>
    <meta charset="UTF-8" />
    <title>Vnos filma</title>
  </head>
  <body>
    <h1>Vnos novega filma</h1>

    <fieldset>
      <legend>Obrazec za vnos</legend>

      <label for="naslov">Vnesi naslov filma*:</label><br />
      <input
        type="text"
        id="naslov"
        name="naslov"
        placeholder="Privzeti naslov"
        size="60"
        maxlength="30"
        pattern="[A-Za-zČčŠšŽž ]+"
        required
      /><br /><br />

      <label for="opis">Kratek opis*:</label><br />
      <textarea id="opis" name="opis" rows="6" cols="50"></textarea><br /><br />

      <!-- SPREMENI -->
      <label for="tip">Tip filma*:</label>
      <select id="tip" name="tip">
        <option value="">--Izberi tip--</option>
        <option value="akcija">Akcija</option>
        <option value="komedija">Komedija</option>
        <option value="drama">Drama</option>
        <option value="triler">Triler</option>
        <option value="animacija">Animacija</option></select
      ><br /><br />

      <label for="datum">Datum izida:</label>
      <input
        type="date"
        id="datum"
        name="datum"
        min="1950-12-31"
        max="2010-05-01"
      /><br /><br />

      <label for="igralec">Glavni igralec/igralka</label>
      <input type="text" id="igralec" name="igralec" size="30" list="igralci" />
      <datalist id="igralci">
        <option value="Leonardo DiCaprio"></option>
        <option value="Meryl Streep"></option>
        <option value="Tom Hanks"></option>
        <option value="Scarlett Johansson"></option>
        <option value="Brad Pitt"></option>
        <option value="Cate Blanchett"></option>
        <option value="Denzel Washington"></option></datalist
      ><br /><br />

      <label for="trajanje">Trajanje filma:</label>
      <input
        type="number"
        id="trajanje"
        name="trajanje"
        min="20"
        max="100"
        value="60"
        step="20"
      /><br /><br />

      <label>Se trenutno predvaja:</label><br />
      <input type="radio" id="predvaja_da" name="predvaja" value="da" />
      <label for="predvaja_da">da</label>
      <input type="radio" id="predvaja_ne" name="predvaja" value="ne" />
      <label for="predvaja_ne">ne</label><br /><br />
    </fieldset>

    <br />

    <fieldset>
      <legend>Nagrada Zlatni globus</legend>

      <label for="nominacije">Število nominacij:</label><br />
      <input
        type="range"
        id="nominacije"
        name="nominacije"
        min="0"
        max="20"
      /><br /><br />

      <label>Dobljene nagrade Zlatni globus za:</label><br />
      <input type="checkbox" id="drama" name="nagrade" value="drama" />
      <label for="drama">najboljši dramski film</label><br />
      <input type="checkbox" id="reziser" name="nagrade" value="reziser" />
      <label for="reziser">najboljši filmski režiser</label><br />
      <input type="checkbox" id="glasba" name="nagrade" value="glasba" />
      <label for="glasba">najboljšo filmsko glasbo</label><br />
      <input type="checkbox" id="scenarij" name="nagrade" value="scenarij" />
      <label for="scenarij">najboljši filmski scenarij</label><br />
    </fieldset>

    <br />
    <input type="submit" value="Pošlji" />
    <input type="reset" value="Ponastavi" />

    <h2>Send e-mail to someone@example.com:</h2>
    <form
      action="mailto:pia.pecovnik@student.um.si"
      method="post"
      enctype="text/plain"
    >
      Name:<br />
      <input type="text" name="name" /><br />
      E-mail:<br />
      <input type="text" name="mail" /><br />
      Comment:<br />
      <input type="text" name="comment" size="50" /><br /><br />
      <input type="submit" value="Send" />
      <input type="reset" value="Reset" />
    </form>
  </body>
</html>
